- name: demo on varaibles
  hosts: localhost
  connection: local
  vars: 
   COURSE: "Ansible"
   TRAINER: "siva"
   DURATION: "100hrs"
  tasks:
  - name: print information
    vars:
     COURSE: "DevOps with AIOps"
    debug:
     msg: "hi,i am learning {{COURSE}}, trainer is {{TRAINER}}, duration is {{DURATION}}"



- name: demo on task level variables
  hosts: localhost
  connection: local # it will not ask for username and password
  vars:
    COURSE: "Ansible"
    TRAINER: "sivakumar"
    DURATION: "150HRS"
  tasks:
  - name: print information
    vars:
     COURSE: "DevSecOps with AIOps"
    debug:
      msg: "Hi, I am learning {{ COURSE }}, Trainer is {{ TRAINER }}, Duration is {{ DURATION }}"